[build]
  command = "npm run build"
  publish = "dist"

# =====================================================
# QR de la presentación → home del app
# El QR está quemado apuntando a /go; este redirect lo
# manda al home. Si en el futuro quieres cambiar el destino,
# solo edita el "to" de abajo.
# =====================================================
[[redirects]]
  from = "/go"
  to = "/"
  status = 302
  force = true

# Presentation static page — must come before the SPA catch-all
[[redirects]]
  from = "/presentation"
  to = "/presentation/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/presentation/*"
  to = "/presentation/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# =====================================================
# Cache-Control
# Sin estas reglas, Netlify revalida los assets estáticos en cada
# navegación (304), que es lo que hace que "se recarguen" las imágenes.
# Con cache fuerte, el navegador las sirve desde su caché sin red.
# =====================================================

# Bundles con hash en el nombre (Vite): seguro cachear para siempre.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes/medios estáticos. Cambian raramente; si actualizas una,
# renómbrala (o cambia el query) para invalidar el caché.
[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/payment/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/presentation/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# El service worker y el manifest deben revalidarse para propagar updates.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
