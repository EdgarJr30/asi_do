## 1. Mapa de superficies y shells

La app se divide en **superficies** (zonas con su propio shell/layout). Una sola persona puede ver
varias según su estado y permisos.

```mermaid
flowchart TB
    subgraph PUB["🌐 Públicas (sin sesión)"]
        INST["Institucional /<br/>(home, membresía, proyectos, elegibilidad)"]
        STORE["Storefront /platform<br/>(producto + job board)"]
        AUTH["Auth /auth<br/>(sign-in, sign-up, confirm)"]
        DONATE["Donaciones /donate<br/>(pago con tarjeta AZUL)"]
        LEGAL["Compliance de pago<br/>/terms · /privacy · /refunds-cancellations ·<br/>/delivery-policy · /payment-security · /payment-receipt-model"]
    end

    subgraph AUTHED["🔒 Autenticadas"]
        ENTRY["/app<br/>(AppEntryRedirect)"]
        MEMB["/account/membership<br/>(panel de membresía)"]
        CAND["/candidate/*<br/>(CandidateShell)"]
        WORK["/workspace/*<br/>(EmployerShell)"]
        ADMIN["/admin/*<br/>(AdminShell)"]
    end

    INST -->|"Iniciar sesión"| AUTH
    INST -->|"Donar"| DONATE
    INST -.->|"Footer legal / checkout"| LEGAL
    STORE -->|"Crear cuenta"| AUTH
    AUTH -->|"login OK"| ENTRY
    ENTRY -->|"sin onboarding"| CAND
    ENTRY -->|"con workspace:read"| WORK
    ENTRY -->|"resto"| CAND
    CAND -->|"sin membresía activa"| MEMB
    WORK -->|"sin membresía activa"| MEMB
    CAND -->|"es admin"| ADMIN
    CAND -->|"es pastor"| CAND
```

**Shells (layouts):**

| Shell | Ruta | Quién |
|---|---|---|
| `InstitutionalShell` | `/` | Público (sitio institucional ASI) |
| `StorefrontShell` | `/platform` | Público (producto + empleos) |
| `AuthShell` | `/auth` | Sin sesión |
| `CandidateShell` (= `PlatformAppShell`) | `/candidate` + `/account/membership` | Todo usuario autenticado |
| `EmployerShell` (= `PlatformAppShell`) | `/workspace` | Con `workspace:read` |
| `AdminShell` | `/admin` | Con acceso a consola admin |

> **Sidebar unificado**: `CandidateShell`/`EmployerShell` comparten `PlatformAppShell`, que SUMA
> grupos al sidebar según el usuario: `Tu espacio` (base) + `Pastoral` (si pastor) + `Mi empresa`
> (si `workspace:read`) + `Administración` (si admin) + `Cuenta`.

## 2. Modelo de sesión, roles y permisos

Al iniciar sesión, `AppSessionProvider` hidrata un **snapshot** que decide todo el acceso.

```mermaid
flowchart TB
    LOGIN["Login / sesión activa"] --> HYDRATE["fetchSessionSnapshot(authUser)"]
    HYDRATE --> P1["profile (users)<br/>flags ATS"]
    HYDRATE --> P2["memberships (tenants)<br/>→ roles → permisos de tenant"]
    HYDRATE --> P3["platformPermissions<br/>(RPC has_platform_permission x N)"]
    HYDRATE --> P4["isPlatformAdmin<br/>(RPC is_platform_admin)"]
    HYDRATE --> P5["activePastorScopeCount<br/>(user_authority_scopes activos)"]

    P1 --> S1["hasActiveAsiAccess<br/>(approval+membership+subscription activos)"]
    P2 --> S2["permissions[]<br/>(unión tenant + plataforma)"]
    P3 --> S2
    P4 --> S3["canAccessAdminConsole"]
    P2 --> S4["workspace:read ⇒ es empleador"]
    P5 --> S5["isMembershipReviewerPastor"]

    S1 --> ACCESS["Acceso ATS"]
    S2 --> ACCESS
    S3 --> ACCESS
    S4 --> ACCESS
    S5 --> ACCESS
```

**Tres capas de autorización (independientes):**

```mermaid
flowchart LR
    subgraph L1["1. Permisos de plataforma"]
        direction TB
        PA["user_platform_roles<br/>→ platform_roles<br/>(platform_owner / platform_admin)"]
        PB["platform_role_permissions<br/>→ permisos (user:approve,<br/>membership_payment:verify, etc.)"]
    end
    subgraph L2["2. Permisos de tenant (empresa)"]
        direction TB
        TA["memberships<br/>→ membership_roles<br/>→ tenant_roles"]
        TB2["tenant_role_permissions<br/>(workspace:read, application:read…)"]
    end
    subgraph L3["3. Alcance territorial (scope)"]
        direction TB
        SA["user_authority_scopes<br/>(pastor_administrator /<br/>regional_administrator)"]
        SB["church_ids[] / district / association / union"]
    end
    PA --> PB
    TA --> TB2
    SA --> SB
```

> **Clave**: el pastor **no** usa permisos para revisar; autoriza por `user_authority_scope` sobre la
> iglesia (validado dentro de los RPCs security-definer). El admin sí usa permisos de plataforma.

🗂️ **Estructura de tablas:** [`users`](arquitectura-db.html#users) · [`user_platform_roles`](arquitectura-db.html#user_platform_roles) · [`platform_roles`](arquitectura-db.html#platform_roles) · [`platform_role_permissions`](arquitectura-db.html#platform_role_permissions) · [`permissions`](arquitectura-db.html#permissions) · [`memberships`](arquitectura-db.html#memberships) · [`membership_roles`](arquitectura-db.html#membership_roles) · [`tenant_roles`](arquitectura-db.html#tenant_roles) · [`tenant_role_permissions`](arquitectura-db.html#tenant_role_permissions) · [`user_authority_scopes`](arquitectura-db.html#user_authority_scopes)

## 3. Guards de acceso (enforcement)

Cada ruta autenticada pasa por una cadena de guards.

```mermaid
flowchart TB
    REQ["Petición a ruta protegida"] --> G0{"session.isLoading?"}
    G0 -->|"sí"| LOAD["PageLoader (espera hidratación)"]
    G0 -->|"no"| G1{"RequireAuth:<br/>isAuthenticated?"}
    G1 -->|"no"| SIGNIN["→ /auth/sign-in"]
    G1 -->|"sí"| G2{"RequireCompletedBaseOnboarding:<br/>full_name+display_name+locale+country?"}
    G2 -->|"no (y no es /profile)"| PROFILE["→ /candidate/profile"]
    G2 -->|"sí"| G3{"¿Ruta exige ATS activo?<br/>RequireActiveAsiAccess"}
    G3 -->|"sí y NO activo"| MEMBPANEL["→ /account/membership"]
    G3 -->|"ok / no aplica"| G4{"¿Exige permiso?<br/>RequirePermission / RequireAnyPermission"}
    G4 -->|"falta permiso"| FORBID["SurfaceStatusPage forbidden<br/>(dentro del shell)"]
    G4 -->|"ok"| G5{"¿Ruta admin?<br/>RequireAdminAccess"}
    G5 -->|"no es admin"| FORBIDADMIN["AdminShell forbidden"]
    G5 -->|"ok"| RENDER["✅ Renderiza la página"]
```

| Guard | Falla → | Usado en |
|---|---|---|
| `RequireAuth` | `/auth/sign-in` | Todo `/app`, `/account`, `/candidate`, `/workspace`, `/admin` |
| `RequireCompletedBaseOnboarding` | `/candidate/profile` | Shells autenticados |
| `RequireActiveAsiAccess` | `/account/membership` | `/candidate/applications`, `/workspace/*` |
| `RequirePermission` | `forbidden` en shell | Rutas con permiso único |
| `RequireAnyPermission` | `forbidden` en shell | `/admin/approvals` |
| `RequireAdminAccess` | `forbidden` admin | Todo `/admin` |

## 4. Journey maestro de un usuario

Recorrido completo: desde llegar al sitio hasta cerrar sesión, cubriendo las bifurcaciones por rol.

```mermaid
flowchart TD
    START(["Visitante"]) --> SITE["Sitio institucional / storefront"]
    SITE --> ELIG["Elegibilidad de membresía<br/>(wizard /eligibility)"]
    SITE --> SIGNUP["Crear cuenta /auth/sign-up"]
    ELIG --> SIGNUP

    SIGNUP --> CONFIRM["Confirmación de email"]
    CONFIRM --> ONB{"¿Onboarding base<br/>completo?"}
    ONB -->|"no"| PROFILE["Completar perfil<br/>(/candidate/profile)"]
    PROFILE --> GATE
    ONB -->|"sí"| GATE{"¿hasActiveAsiAccess?"}

    GATE -->|"no (cuenta pendiente)"| MPANEL["Panel de membresía<br/>/account/membership"]
    MPANEL --> APPLY["Enviar solicitud<br/>(form 6 pasos + iglesia)"]
    APPLY --> PAY["Pagar con tarjeta<br/>(pasarela AZUL · 1-5 años)"]
    PAY --> WAIT["Esperar revisión pastoral + activación admin"]
    WAIT -->|"admin activa"| GATE

    GATE -->|"sí (activo)"| HOME{"¿Rol?"}
    HOME -->|"candidato"| CHOME["Candidate home<br/>(jobs, perfil, aplicaciones)"]
    HOME -->|"empleador (workspace:read)"| WHOME["Workspace<br/>(vacantes, pipeline, talento)"]
    HOME -->|"pastor (scope activo)"| PQUEUE["+ Cola de su iglesia"]
    HOME -->|"admin"| ACONSOLE["+ Consola admin"]

    CHOME --> ACT["Usa la plataforma"]
    WHOME --> ACT
    PQUEUE --> ACT
    ACONSOLE --> ACT
    ACT --> LOGOUT["Cerrar sesión<br/>(signOutCurrentUser)"]
    LOGOUT --> SIGNIN2["→ /auth/sign-in"]
```

## 5. Auth, onboarding y redirección de entrada

```mermaid
sequenceDiagram
    actor U as Usuario
    participant UI as SignUp/SignIn
    participant SB as Supabase Auth
    participant TRG as Trigger handle_new_user
    participant SES as AppSession
    participant RT as Router

    U->>UI: email + password (registro)
    UI->>SB: signUpWithPassword
    SB->>TRG: crea auth user
    TRG->>TRG: INSERT public.users<br/>(status pending_review,<br/>asi_membership none)
    SB-->>U: email de confirmación
    U->>SB: confirma email → login
    SB-->>SES: sesión
    SES->>SES: fetchSessionSnapshot()
    SES->>RT: refresh()
    RT->>RT: getAuthenticatedHomePath(workspace?, onboarding?)
    alt onboarding incompleto
        RT-->>U: /candidate/profile
    else workspace:read
        RT-->>U: /workspace
    else
        RT-->>U: /candidate
    end
```

**Onboarding base** = `full_name` + `display_name` + `locale ∈ {es,en}` + `country_code` (2 letras).
Mientras falte, `RequireCompletedBaseOnboarding` fuerza `/candidate/profile`.

🗂️ **Estructura de tablas:** [`users`](arquitectura-db.html#users)

## 6. Gating del ATS

El "ATS" (área autenticada productiva) se desbloquea solo con **membresía activa**.

```mermaid
stateDiagram-v2
    [*] --> Pendiente: cuenta creada
    Pendiente: user_approval_status = pending_review<br/>asi_membership_status = none<br/>ATS BLOQUEADO
    Pendiente --> Activo: admin activa (exige aprobado + pago verificado)
    Activo: status=active, approval=approved,<br/>asi_membership=active,<br/>subscription=active, +1 año
    Activo --> ATS: hasActiveAsiAccess = true
    ATS: Acceso a /candidate/applications,<br/>/workspace/*
    Activo --> Activo: renovación con tarjeta (AZUL extiende +N años)
    Activo --> GracePeriod: vence membership_expires_at
    GracePeriod --> Activo: renovación con tarjeta
    GracePeriod --> Expirado: sin renovación
    Expirado --> Pendiente: requiere re-activación
    note right of Pendiente
        Override: manual_access_override_until
        (pastores/admins pueden entrar sin pago)
    end note
```

`hasActiveAsiAccess(profile)` = (approval=approved **y** asi_membership=active **y** subscription=active
**y** no vencido) **o** `manual_access_override_until` vigente.

🗂️ **Estructura de tablas:** [`users`](arquitectura-db.html#users) (flags `user_approval_status`, `asi_membership_status`, `user_subscription_status`, `membership_expires_at`, `manual_access_override_until`)

## 7. Pipeline de membresía

El carril central. **Separación de funciones**: quien solicita ≠ quien aprueba ≠ quien activa. El
pago de la membresía se cobra **con tarjeta** a través de la pasarela **AZUL** (auto-verificado por
callback firmado); la verificación manual de comprobante queda como **vía de respaldo** (pastor/admin
registran un pago offline y un admin lo marca `verified`).

```mermaid
sequenceDiagram
    actor M as 🧑 Miembro
    actor P as ⛪ Pastor
    actor A as 🛡️ Admin
    participant SVC as 💳 azul-payments
    participant DB as BD + RPCs (security definer)

    M->>DB: 1. submitInstitutionalMembershipApplication<br/>(categoría + church_id)
    DB->>DB: Trigger auto-ruteo: pastor_user_for_church(church_id)<br/>+ notifica pastor/admins (Fase 5)
    Note over DB: status = submitted

    M->>SVC: 2. Pagar con tarjeta (intent=initial, 1-5 años)
    SVC->>DB: azul_begin_membership_payment → payment.status='initiated'
    Note over SVC,DB: AZUL Payment Page · callback firmado (HMAC) →<br/>azul_settle_membership_payment(approved)
    DB->>DB: payment.status=verified · notifica miembro + admins
    Note over DB: 🔗 detalle en ../pasarelaDePagos/flujo-azul.md

    alt Hay pastor con scope
        P->>DB: 3a. review_membership_application(approved)<br/>(autoriza por user_authority_scope)
    else Sin pastor → cola admin
        A->>DB: 3b. review_membership_application(approved)
    end
    Note over DB: status=approved, pastoral_reference=endorsed<br/>notifica miembro · audit: membership_application.reviewed

    A->>DB: 4. activate_member()<br/>(exige approved + pago verified)
    DB->>DB: flip flags usuario (+N años de vigencia)
    Note over DB: ATS ON · notifica bienvenida · audit: member.activated
```

> **Renovación (miembro ya activo):** no requiere admin. Un pago `intent=renewal` aprobado por AZUL
> ejecuta `azul_settle_membership_payment`, que **extiende `membership_expires_at`** automáticamente
> y notifica al miembro y a los admins. Ver §6 y §7.1.

**Variantes / loops:**

```mermaid
flowchart LR
    SUB["submitted"] --> REV{"Revisión<br/>pastor/admin"}
    REV -->|"aprobar"| APP["approved"]
    REV -->|"pedir info"| NMI["needs_more_info"]
    REV -->|"rechazar"| REJ["rejected"]
    NMI -->|"respond_membership_application<br/>(miembro responde)"| UR["under_review"]
    UR --> REV
    APP --> PAID{"Pago verificado?"}
    PAID -->|"tarjeta AZUL<br/>(initiated→verified)"| ACT{"activate_member"}
    PAID -->|"respaldo: comprobante<br/>verify_membership_payment"| ACT
    PAID -->|"failed / declinado"| RETRY["Miembro reintenta el pago"]
    RETRY --> PAID
    ACT -->|"approved + verified"| ON["✅ Cuenta activa (ATS ON)"]
```

🗂️ **Estructura de tablas:** [`institutional_membership_applications`](arquitectura-db.html#institutional_membership_applications) · [`membership_payments`](arquitectura-db.html#membership_payments) · [`user_authority_scopes`](arquitectura-db.html#user_authority_scopes) · [`churches`](arquitectura-db.html#churches) · [`audit_logs`](arquitectura-db.html#audit_logs)

### 7.1 Pago con tarjeta — pasarela AZUL

El cobro con tarjeta vive en el microservicio `services/azul-payments` (la `AuthKey` nunca toca el
browser ni la BD). El miembro elige **1 a 5 años**; la cuota se calcula server-side desde
`membership_payment_settings`.

```mermaid
flowchart LR
    PAY["Panel: Pagar con tarjeta<br/>(acepta términos + años)"] --> BEGIN["POST /payments/azul/create<br/>(Bearer JWT)"]
    BEGIN --> RPC1["azul_begin_membership_payment<br/>status='initiated' · order_number"]
    RPC1 --> FORM["Microservicio firma AuthHash<br/>(HMAC-SHA512)"]
    FORM --> AZUL["Auto-POST a AZUL Payment Page<br/>(navegación full-page)"]
    AZUL --> CB["GET /payments/azul/callback?outcome=…&AuthHash=…"]
    CB --> VERIF{"AuthHash válido +<br/>IsoCode=00 + monto OK?"}
    VERIF -->|"sí"| SETTLE["azul_settle_membership_payment(approved)<br/>status='verified' · notifica"]
    VERIF -->|"no"| FAIL["status='failed'<br/>(idempotente, no toca pagos ya resueltos)"]
    SETTLE -->|"initial"| ADMINACT["Admin activa la cuenta"]
    SETTLE -->|"renewal"| EXT["Extiende membership_expires_at +N años"]
    FAIL --> RETRY2["Miembro reintenta desde el panel"]
```

> Garantías: verificación del **AuthHash de respuesta** (anti-falsificación de "Approved"),
> **verificación de monto** (anti-tamper), **idempotencia** (solo actúa sobre `initiated`) y **no se
> almacenan datos de tarjeta**. Conciliación server-to-server por cron para pagos `initiated`
> colgados. Detalle completo en **[flujo-azul.md](../pasarelaDePagos/flujo-azul.md)**.

🗂️ **Estructura de tablas:** [`membership_payments`](arquitectura-db.html#membership_payments) (campos AZUL: `order_number`, `intent`, `term_months`, `period_start/end`, `authorization_code`, `azul_rrn`) · [`membership_payment_settings`](arquitectura-db.html#membership_payment_settings) (`azul_enabled`, `azul_environment`, `azul_currency_code`)

## 8. Flujo del MIEMBRO

Panel guiado `/account/membership` ("Tu membresía") con **3 tabs** (Resumen · Ruta · Comprobantes) y
**4 pasos en vivo** (Solicitud → Pago → Aprobación → Activación) que se actualizan por Supabase
Realtime.

```mermaid
flowchart TD
    LAND["/account/membership · 'Tu membresía'<br/>(redirigido por gating, o ya activo)"] --> TABS["Tabs: Resumen · Ruta · Comprobantes"]
    TABS --> STEPS["Ruta: 4 pasos en vivo"]
    STEPS --> S1["1. Solicitud"]
    STEPS --> S2["2. Pago"]
    STEPS --> S3["3. Aprobación"]
    STEPS --> S4["4. Activación"]

    S1 -->|"Iniciar"| ELG["/eligibility (categoría)"]
    ELG --> FORM["Formulario 6 pasos<br/>(contacto, categoría, evangelismo,<br/>referencia+iglesia, cuotas, compromiso)"]
    FORM -->|"Enviar"| OKSUB["Solicitud creada → vuelve al panel"]

    S2 -->|"solicitud lista"| PAYCARD["Pagar con tarjeta (AZUL)<br/>elige 1-5 años + acepta términos"]
    PAYCARD --> RES{"Retorno de AZUL"}
    RES -->|"approved"| OKPAY["Pago verificado<br/>(realtime refresca el panel)"]
    RES -->|"declined / cancelled / error"| RETRY["Reintentar pago"]
    RETRY -.-> PAYCARD

    S3 -->|"needs_more_info"| NOTE["Ver nota del pastor + responder<br/>→ reenviar a revisión"]
    S4 -->|"activado"| ENTER["Botón: Entrar a la plataforma"]

    TABS --> RCPT["Comprobantes: historial de pagos verificados<br/>(recibo descargable / compartible)"]
    LAND --> ACTIVE{"¿Miembro activo?"}
    ACTIVE -->|"sí"| RENEW["Renovar 1-5 años<br/>(extiende vigencia, sin admin)"]

    OKSUB -.-> S2
    OKPAY -.-> S3
    NOTE -.-> S3
```

Estados que ve el miembro: solicitud → `Enviada / En revisión / Falta información / Aprobada /
Rechazada`; pago → `Procesando pago (initiated) / Verificado / Pago rechazado (failed) / Declinado /
Cancelado / Error de validación` (más `En verificación` para el respaldo de comprobante manual).

> El pago manual con comprobante **ya no se ofrece al miembro**: el panel solo expone el pago con
> tarjeta AZUL. La carga de comprobante offline persiste como acción de **pastor/admin** (§9, §10).

## 9. Flujo del PASTOR

Un pastor primero **obtiene alcance**, luego **revisa la cola** de sus iglesias.

```mermaid
flowchart TD
    subgraph ALTA["A. Obtener autoridad"]
        REG["Pastor se registra<br/>(usuario normal)"] --> AREQ["/candidate/authority-request<br/>(elige iglesias)"]
        AREQ --> ADMINREV{"Admin revisa<br/>review_pastor_authority_request"}
        ADMINREV -->|"aprueba"| SCOPE["INSERT user_authority_scope<br/>(pastor_administrator + church_ids)"]
    end

    subgraph COLA["B. Cola de revisión"]
        SCOPE --> DETECT["session.isMembershipReviewerPastor = true<br/>(activePastorScopeCount > 0)"]
        DETECT --> NAV["Aparece nav 'Solicitudes de mi iglesia'<br/>/candidate/membership-queue"]
        NAV --> QUEUE["fetchPastorMembershipQueue<br/>(RLS limita a SUS iglesias)"]
        QUEUE --> ACTIONS{"Por solicitud"}
        ACTIONS -->|"Aprobar"| APR["review RPC → approved + endorsed"]
        ACTIONS -->|"Más info"| MI["needs_more_info"]
        ACTIONS -->|"Rechazar"| RJ["rejected + declined"]
        ACTIONS -->|"Subir comprobante"| UPB["submitMembershipPaymentReceipt<br/>(por el miembro)"]
        ACTIONS -->|"Ver comprobante"| VC["URL firmada"]
    end

    note1["🔒 RLS: pastor_has_scope_over_member<br/>solo ve solicitudes/pagos/comprobantes<br/>de iglesias donde tiene scope"]
    QUEUE -.- note1
```

> El pastor **no** puede verificar pagos ni activar (eso es admin). Solo aprueba la **referencia
> pastoral**.

🗂️ **Estructura de tablas:** [`pastor_authority_requests`](arquitectura-db.html#pastor_authority_requests) · [`user_authority_scopes`](arquitectura-db.html#user_authority_scopes) · [`institutional_membership_applications`](arquitectura-db.html#institutional_membership_applications) · [`membership_payments`](arquitectura-db.html#membership_payments)

## 12. Flujo de EMPLEO

Dos lados: el **candidato** que aplica y el **empleador** que gestiona el pipeline.

```mermaid
flowchart LR

        APPLY2 --> TRACK["/candidate/applications<br/>(seguimiento status_public)"]
    end

        WJOBS["/workspace/jobs<br/>(publicar vacantes)"] --> WAPP["/workspace/applications"]
        WAPP --> PIPE["/workspace/pipeline<br/>(move_application_stage)"]

```mermaid
stateDiagram-v2

    submitted --> under_review

    submitted --> approved

    approved --> [*]
    rejected --> [*]

```

### Pago de membresía (`membership_payment_status`)
```mermaid
stateDiagram-v2
    [*] --> initiated: tarjeta · azul_begin_membership_payment
    [*] --> submitted: respaldo · comprobante offline (pastor/admin)
    initiated --> verified: callback AZUL aprobado (azul_settle)
    initiated --> failed: declinado / cancelado / cron
    failed --> initiated: el miembro reintenta
    submitted --> verified: admin (verify_membership_payment)
    submitted --> rejected: admin
    rejected --> submitted: re-subida
    verified --> [*]: inicial → admin activa · renovación → vigencia extendida
```

### Referencia pastoral (`pastoral_reference_status`)
```mermaid
stateDiagram-v2
    [*] --> pending
    pending --> contacted
    pending --> endorsed: aprobación
    pending --> declined: rechazo
    pending --> waived: sin pastor (admin)
```

### Cuenta / membresía ASI (`asi_membership_status`)
```mermaid
stateDiagram-v2
    [*] --> none
    none --> pending: solicitud en curso
    pending --> active: activate_member
    active --> active: renovación con tarjeta (extiende vigencia)
    active --> grace_period: vence membership_expires_at
    grace_period --> active: renovación con tarjeta
    grace_period --> expired
    expired --> active: re-activación (nuevo pago + admin)
```

### Autoridad territorial (`authority_scope_status`)
```mermaid
stateDiagram-v2
    [*] --> active: admin aprueba authority_request
    active --> revoked: admin revoca
```

## 16. Donaciones y superficies de compliance de pago

Además de la membresía, la plataforma cobra **donaciones** con tarjeta (mismo microservicio AZUL) y
expone las páginas de **compliance** que exige el comercio para operar la pasarela.

```mermaid
flowchart TD
    subgraph DONA["💝 Donaciones (público, sin sesión)"]
        D0["/donate"] --> D1["list_active_donation_amount_options<br/>(montos sugeridos + libre)"]
        D1 --> D2["POST /payments/azul/donations/create<br/>(service role, sin JWT)"]
        D2 --> D3["azul_begin_donation → donations.status='initiated'"]
        D3 --> D4["AZUL Payment Page"]
        D4 --> D5["callback firmado →<br/>azul_settle_donation_payment(verified|failed|cancelled)"]
        D5 --> D6["correo de comprobante<br/>si verified + donor_email"]
        D5 --> D7["/admin/donations<br/>(seguimiento + montos)"]
    end

    subgraph LEGAL["📄 Compliance pública (footer + checkout)"]
        T1["/terms"]
        T2["/privacy"]
        T3["/refunds-cancellations"]
        T4["/delivery-policy"]
        T5["/payment-security"]
        T6["/payment-receipt-model"]
    end
```

> El checkout de membresía y de donación enlaza estas páginas y exige **aceptar términos** antes de
> redirigir a AZUL. El microservicio firma/verifica el AuthHash igual que en membresía.
> `/donate` no muestra historial de donaciones al donante; solo confirma la transacción actual y el
> comprobante aprobado se envía por email. El historial operativo queda en `/admin/donations`.

🗂️ **Estructura de tablas:** [`donations`](arquitectura-db.html#donations) · [`donation_amount_options`](arquitectura-db.html#donation_amount_options) · [`membership_payment_settings`](arquitectura-db.html#membership_payment_settings)

## Estado de implementación

**✅ Implementado desde la última generación del flujograma:**

- **Pasarela AZUL** para membresía (inicial + renovación 1-5 años) con callback firmado, idempotencia
  y conciliación por cron (§7.1).
- **Renovación multi-año**: un pago `intent=renewal` aprobado **extiende `membership_expires_at`**
  automáticamente, sin re-activación admin.
- **Fase 5 — Notificaciones**: ya **cableadas** (triggers `*_notify_submitted` + RPCs `review` /
  `verify` / `activate` / `azul_settle`). Disparan: nueva solicitud→pastor+admins, pago→admins,
  decisión→miembro, activación/bienvenida→miembro, renovación→miembro+admins. Inbox in-app + cola de
  email Resend vía `process-email-deliveries`.
- **Donaciones** con tarjeta (§16) y **superficies de compliance** de pago.
- **Historial de comprobantes** descargables/compartibles en el panel del miembro (§8).

**🔜 Pendientes conocidos:**

- **Recordatorios proactivos de renovación**: el flujo de re-pago existe, pero falta el aviso
  automático *antes* de que venza `membership_expires_at`.
- **Webservice de consulta AZUL** para la conciliación (hoy el cron solo loguea si no está
  configurado; el callback firmado sigue siendo la vía principal).
- **Contenido real (§8)**: cuotas por categoría + montos de donación parten de seeds de prueba.
