<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3955B8" />
    <meta
      name="description"
      content="Plataforma SaaS de reclutamiento y empleo con perfiles profesionales, CV reutilizable y ATS-lite."
    />
    <link rel="icon" type="image/svg+xml" href="/icons/app-icon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!--
      Precarga del hero (elemento LCP de la home). Se descubre antes de parsear
      el CSS, en paralelo con las fuentes, y con prioridad alta. Las media
      queries reflejan el <picture> del hero: móvil vs. escritorio.
    -->
    <link
      rel="preload"
      as="image"
      href="/media/2026-asi-convention_movil.webp"
      media="(max-width: 767px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/media/2026-asi-convention_desktop.webp"
      media="(min-width: 768px)"
      fetchpriority="high"
    />
    <title>ASI Rep. Dominicana</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
